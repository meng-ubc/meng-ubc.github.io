        summary: "Mentor: Dr. Ang Li"
        highlights:
          - Led research on architectural optimizations for fault-tolerant quantum computing, resulting in an accepted paper at **ISCA 2026** focused on transpiler-architecture co-design to curb Clifford costs, with follow-up work currently in preparation for **HPCA 2027**.
      - company: Pacific Northwest National Laboratory
        position: Ph.D. Research Intern
        start_date: 2022-10
        end_date: 2023-08
        location: Richland, WA, USA
        summary: "Mentors: Dr. Ang Li and Dr. Bo Fang"
        highlights:
          - Participated in developing simulation frameworks leveraging leading HPC systems including Frontier, Summit, and Perlmutter to simulate large-scale quantum circuits on GPU clusters. The simulation framework is open-sourced at [NWQ-Sim](https://github.com/pnnl/NWQ-Sim).
          - Led research improving the efficiency of classical optimization in Quantum Approximate Optimization Algorithm (QAOA), resulting in the publication of Red-QAOA (**ASPLOS 2024**), which introduces a novel circuit reduction technique for efficient variational optimization.
    "Invited Talks and Guest Lectures":
      - format: Seminar
        title: "From Circuits to Systems: Rethinking How Quantum Computation is Realized"
        institution: North Carolina State University
        place: Raleigh, NC, USA
        host: Prof. Huiyang Zhou
        date: July 2026
