        date: August 2023
    "Professional Service":
      - bullet: "**Technical Program Committee**, MICRO 2026, IEEE/ACM International Symposium on Microarchitecture."
    "Research Software Infrastructure":
      - name: NWQEC
        url: https://github.com/pnnl/nwqec
        summary: Led development of a C++/Python toolkit for fault-tolerant quantum circuit transpilation, including OpenQASM parsing, Clifford+T synthesis, T-count analysis, Pauli-based circuit optimization, and Clifford reduction passes for QEC-oriented compilation research.
      - name: NWQ-Sim
        url: https://github.com/pnnl/nwq-sim
        summary: Core contributor to a quantum system simulation environment for multi-node, multi-CPU/GPU HPC systems, supporting state-vector and density-matrix simulation with frontends including QASM, Qiskit, QIR/Q#, and XACC.
      - name: QASMTrans
        url: https://github.com/pnnl/qasmtrans
        summary: Core contributor to a C++ OpenQASM transpiler for mapping quantum circuits to NISQ devices under vendor-specific basis-gate and qubit-topology constraints, with support for IBMQ, Rigetti, IonQ, and Quantinuum-style backends.
      - name: XACC
        url: https://github.com/eclipse-xacc/xacc
        summary: Contributed to XACC, an extensible hybrid quantum-classical programming and compilation framework with language frontends, backend compilation components, and a quantum intermediate representation for QPUs and simulators.
    Mentoring:
      - bullet: Mentored **Aaron Hoyt** from the University of Washington on QASMTrans, contributing to an accepted journal paper at **Transactions on Quantum Computing**.
      - bullet: Mentored **Sean Garner** from the University of Washington on quantum error-correction noise simulation, contributing to a publication in **Physical Review Research**.
      - bullet: Mentored **Avinash Kumar** from the University of Texas at Austin on Qontext, a project on secure context switching for multi-programmed near-term quantum computers.
